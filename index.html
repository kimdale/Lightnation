<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightNation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 10%, #0b2a45 0%, #0b1220 55%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .tagline {
      color: #9ca3af;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #0ea5e9;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(14,165,233,0.3);
    }

    .btn:hover {
      background: #0284c7;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>LIGHTNATION</h1>
    <div class="tagline">PRECISION LIGHTING FOR POWERFUL SHOWS</div>

    <a href="tools.html" class="btn">
      Open Internal Tools
    </a>

    <div class="footer">
      © 2026 LightNation
    </div>
  </div>

</body>
</html>
